experiment_name: week06_agent_vllm_server
backend: vllm
model: /root/autodl-tmp/models/Qwen2.5-7B-Instruct
output_dir: experiments/runs/week06/agent_baseline/vllm_server
repeat: 3
concurrency: 1
server:
  base_url: http://127.0.0.1:8000
  api_key: EMPTY
  timeout_s: 300
sampling:
  temperature: 0.0
  top_p: 1.0
  max_tokens: 128
workloads:
  - type: single_tool
    count: 1
    system_tokens: 64
    tool_count: 2
    tool_tokens: 16
    turns: 2
    observation_tokens: 0
    output_tokens: 64
  - type: multi_tool_serial
    count: 1
    system_tokens: 64
    tool_count: 2
    tool_tokens: 16
    turns: 3
    observation_tokens: 32
    output_tokens: 64
  - type: long_observation
    count: 1
    system_tokens: 64
    tool_count: 2
    tool_tokens: 16
    turns: 3
    observation_tokens: 96
    output_tokens: 64
