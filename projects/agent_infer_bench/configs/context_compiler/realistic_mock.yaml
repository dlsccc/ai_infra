experiment_name: context_compiler_realistic_mock
backend: mock
model: mock
output_dir: experiments/runs/context_compiler/realistic/mock
repeat: 1
concurrency: 1
sampling:
  temperature: 0.0
  top_p: 1.0
  max_tokens: 64
workloads:
  - type: context_compiler_realistic_ablation
    scenario: function_calling
    count: 1
    turns: 2
    observation_tokens: 64
    output_tokens: 64
    max_observation_words: 40
    variants:
      - original_bad_layout
      - context_compiler_no_compression
      - context_compiler_with_observation_compression
  - type: context_compiler_realistic_ablation
    scenario: coding_agent
    count: 1
    turns: 2
    observation_tokens: 96
    output_tokens: 64
    max_observation_words: 50
    variants:
      - original_bad_layout
      - context_compiler_no_compression
      - context_compiler_with_observation_compression
