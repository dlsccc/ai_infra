experiment_name: sglang_smoke
backend: sglang
model: Qwen/Qwen2.5-7B-Instruct
output_dir: experiments/runs/week05/sglang_smoke
engine:
  tensor_parallel_size: 1
  mem_fraction_static: 0.85
  context_length: 4096
sampling:
  temperature: 0.0
  top_p: 1.0
  max_tokens: 64
workloads:
  - type: plain_chat
    count: 1
    prompt_tokens: 64
    output_tokens: 32
  - type: plain_chat
    count: 1
    prompt_tokens: 256
    output_tokens: 64
  - type: single_tool
    count: 1
    system_tokens: 64
    tool_count: 3
    tool_tokens: 20
    turns: 1
    observation_tokens: 0
    output_tokens: 48
