experiment_name: vllm_smoke
backend: vllm
model: Qwen/Qwen2.5-7B-Instruct
output_dir: experiments/runs/week05/vllm_smoke
engine:
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.85
  max_model_len: 4096
sampling:
  temperature: 0.0
  top_p: 1.0
  max_tokens: 64
workloads:
  - type: plain_chat
    count: 1
    prompt_tokens: 128
    output_tokens: 64
  - type: plain_chat
    count: 1
    prompt_tokens: 512
    output_tokens: 128
  - type: single_tool
    count: 1
    system_tokens: 256
    tool_count: 5
    tool_tokens: 120
    turns: 1
    observation_tokens: 0

